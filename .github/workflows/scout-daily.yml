name: VC Scout — daily digest

on:
  schedule:
    # 06:00 UTC Mon-Fri = 07:00 / 08:00 CET (winter / summer). EU markets opening hour.
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # required to commit the SQLite KB + reports back to the reports branch

concurrency:
  # Shared across daily / urgent / weekly so KB writes never overlap and
  # clobber each other — the runs serialize, which keeps memory compounding.
  group: vc-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore knowledge base from previous runs
        uses: actions/cache/restore@v4
        with:
          path: data/vc_scout.db
          key: vc-scout-kb-${{ github.run_id }}
          restore-keys: vc-scout-kb-

      - name: Seed KB from reports branch if the cache missed
        run: |
          if [ ! -f data/vc_scout.db ]; then
            echo "cache miss — trying the durable reports branch"
            git fetch origin reports --depth 1 2>/dev/null || true
            mkdir -p data
            git show origin/reports:data/vc_scout.db > data/vc_scout.db 2>/dev/null \
              && echo "seeded KB from reports branch" \
              || { rm -f data/vc_scout.db; echo "no prior KB — starting fresh"; }
          fi

      - name: Run scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WATCHLIST_CSV: ${{ secrets.WATCHLIST_CSV }}
        run: python -m src.main

      - name: Save knowledge base cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/vc_scout.db
          key: vc-scout-kb-${{ github.run_id }}

      - name: Publish reports to the reports branch
        if: success()
        continue-on-error: true   # report history is nice-to-have — never fail the run over it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -d outputs ] && [ ! -f data/vc_scout.db ]; then
            echo "nothing generated this run — skipping publish"
            exit 0
          fi
          # Work in an isolated clone so we never branch-switch the main working
          # tree — that is where the earlier 'git checkout -' crash lived.
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          PUB="$(mktemp -d)"
          if git ls-remote --exit-code --heads "$REPO_URL" reports >/dev/null 2>&1; then
            git clone --depth 1 --branch reports "$REPO_URL" "$PUB"
          else
            git init -q "$PUB"
            git -C "$PUB" checkout -q -b reports
          fi
          git -C "$PUB" config user.name "vc-scout-bot"
          git -C "$PUB" config user.email "vc-scout-bot@users.noreply.github.com"
          [ -d outputs ] && cp -r outputs "$PUB/outputs" || true
          if [ -f data/vc_scout.db ]; then
            mkdir -p "$PUB/data"
            cp data/vc_scout.db "$PUB/data/vc_scout.db"
          fi
          git -C "$PUB" add -A
          if git -C "$PUB" diff --cached --quiet; then
            echo "no report changes to publish"
            exit 0
          fi
          git -C "$PUB" commit -m "scout: run $(date -u +%Y-%m-%dT%H:%MZ)"
          git -C "$PUB" push "$REPO_URL" HEAD:reports

      - name: Upload reports as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vc-scout-reports-${{ github.run_id }}
          path: |
            outputs/
            data/vc_scout.db
          if-no-files-found: warn
          retention-days: 30
