name: VC Scout — urgent intra-day

on:
  schedule:
    # 08 / 13 / 17 UTC Mon-Fri — three checks spanning the European business day.
    # Was hourly; trimmed to 3x/day after a Haiku-powered urgent path made the
    # bottleneck the schedule, not the model.
    - cron: "0 8,13,17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Shared with daily / weekly so KB writes serialize — see scout-daily.yml.
  group: vc-scout
  cancel-in-progress: false

jobs:
  scout-urgent:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore knowledge base
        uses: actions/cache/restore@v4
        with:
          path: data/vc_scout.db
          key: vc-scout-kb-${{ github.run_id }}
          restore-keys: vc-scout-kb-

      - name: Seed KB from reports branch if the cache missed
        run: |
          if [ ! -f data/vc_scout.db ]; then
            echo "cache miss — trying the durable reports branch"
            git fetch origin reports --depth 1 2>/dev/null || true
            mkdir -p data
            git show origin/reports:data/vc_scout.db > data/vc_scout.db 2>/dev/null \
              && echo "seeded KB from reports branch" \
              || { rm -f data/vc_scout.db; echo "no prior KB — starting fresh"; }
          fi

      - name: Run scout — urgent only
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WATCHLIST_CSV: ${{ secrets.WATCHLIST_CSV }}
          COST_BUDGET_USD: ${{ vars.COST_BUDGET_USD }}
          SCOUT_URGENT_MODEL: ${{ vars.SCOUT_URGENT_MODEL }}
        run: python -m src.main --urgent

      # The KB must be saved back, not just restored — the sent_alerts dedup
      # ledger written this run is what stops the next hourly run re-sending
      # the same urgent alert.
      - name: Save knowledge base cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/vc_scout.db
          key: vc-scout-kb-${{ github.run_id }}
