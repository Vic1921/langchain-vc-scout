name: VC Scout — urgent intra-day

on:
  schedule:
    # Every hour, Mon-Fri during European business hours (07:00-19:00 UTC).
    # Cheap path: only fires URGENT alerts (watchlist hit + funding signal).
    - cron: "0 7-19 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scout-urgent
  cancel-in-progress: true

jobs:
  scout-urgent:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore knowledge base
        uses: actions/cache/restore@v4
        with:
          path: data/vc_scout.db
          key: vc-scout-kb-${{ github.run_id }}
          restore-keys: vc-scout-kb-

      - name: Run scout — urgent only
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main --urgent
