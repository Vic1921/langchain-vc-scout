name: VC Scout — weekly rollup

on:
  schedule:
    # 07:00 UTC Monday — the LP-grade synthesis to open the week with.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Shared with daily / urgent so KB reads see a consistent file.
  group: vc-scout
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore knowledge base
        uses: actions/cache/restore@v4
        with:
          path: data/vc_scout.db
          key: vc-scout-kb-${{ github.run_id }}
          restore-keys: vc-scout-kb-

      - name: Seed KB from reports branch if the cache missed
        run: |
          if [ ! -f data/vc_scout.db ]; then
            echo "cache miss — trying the durable reports branch"
            git fetch origin reports --depth 1 2>/dev/null || true
            mkdir -p data
            git show origin/reports:data/vc_scout.db > data/vc_scout.db 2>/dev/null \
              && echo "seeded KB from reports branch" \
              || { rm -f data/vc_scout.db; echo "no prior KB — rollup will be sparse"; }
          fi

      # The rollup is pure-data (no LLM call), so it needs no ANTHROPIC_API_KEY.
      - name: Build weekly rollup
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WATCHLIST_CSV: ${{ secrets.WATCHLIST_CSV }}
        run: python -m src.main --weekly

      - name: Upload rollup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vc-scout-weekly-${{ github.run_id }}
          path: outputs/
          if-no-files-found: warn
          retention-days: 90
